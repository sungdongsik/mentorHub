spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mentorhub?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  batch:
    jdbc:
      initialize-schema: always
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}      # Gemini API 호출에 사용하는 Google API Key
        project-id: ${GCP_PROJECT_ID}  # Google Cloud Project ID
        location: us-central1          # Gemini API 실행 리전 (전 세계 공통 권장값)
        chat:
          model: gemini-3-pro-preview      # 사용할 Gemini 모델
          options:
            temperature: 0.5           # 응답 창의성 조절 (0.0=정확 / 1.0=창의적, 0.5는 균형형)
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              model: gemini-embedding-001  # Gemini embedding 모델
    vectorstore:
      qdrant:
        host: localhost                 # Qdrant 서버 주소
        port: 6334                      # Qdrant GRPC 포트
        api-key:                        # Qdrant 인증용 API Key (로컬이면 보통 비워둠)
        collection-name: mentee_writing_vectors  # 멘티 글 임베딩을 저장하는 컬렉션 이름
        use-tls: false                  # HTTPS(TLS) 사용 여부 (로컬 환경에서는 false)
        initialize-schema: true         # 애플리케이션 시작 시 컬렉션 자동 생성 여부
  mail:
    host: smtp.gmail.com                # SMTP 서버 호스트 (Gmail 사용)
    port: 587                           # SMTP 포트 (TLS 사용 시 587)
    username: sds970320@gmail.com       # 발신자 이메일 계정
    password: ${MAIL_PASSWORD}          # 앱 비밀번호 (보안상 환경변수 사용 권장)
    properties:
      mail:
        smtp:
          auth: true                    # SMTP 인증 사용 여부
          starttls:
            enable: true                # STARTTLS 활성화 (보안 연결)
            required: true              # STARTTLS 필수 사용 설정
          connectiontimeout: 5000       # 연결 타임아웃 (밀리초)
          timeout: 5000                 # 읽기 타임아웃 (밀리초)
          writetimeout: 5000            # 쓰기 타임아웃 (밀리초)
